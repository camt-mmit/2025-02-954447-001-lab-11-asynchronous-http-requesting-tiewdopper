@if (accessTokenResource.hasValue()) {
  <div>
    <button type="button" (click)="logout()">Logout</button>
    <nav class="google-nav">
      <ul class="google-list">
        <li class="list">
          <a routerLink="events" routerLinkActive="is-active">Event</a>
        </li>
        <li class="list">
          <a routerLink="contact" routerLinkActive="is-active">Contact</a>
        </li>
      </ul>
    </nav>
  </div>
  <router-outlet></router-outlet>
} @else if (accessTokenResource.error()) {
  <button type="button" (click)="login()">Login with Google</button>
} @else if (accessTokenResource.isLoading()) {
  <p>Loading....</p>
}
